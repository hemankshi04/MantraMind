<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — Mantra & Mind</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080C12;--card:#141B27;--border:#1E2A3A;--gold:#F4C542;--text:#E8F0FE;--muted:#6B7A99;--green:#3EE07A;--red:#EF5350}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(244,197,66,.06),transparent 55%);pointer-events:none}
.box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);font-style:italic;text-align:center;margin-bottom:2rem}
h1{font-family:'Playfair Display',serif;font-size:26px;color:var(--text);margin-bottom:.3rem}
p{font-size:13px;color:var(--muted);margin-bottom:2rem}
.flash{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:1rem}
.flash.error{background:rgba(239,83,80,.12);border:1px solid rgba(239,83,80,.3);color:var(--red)}
.flash.success{background:rgba(62,224,122,.12);border:1px solid rgba(62,224,122,.3);color:var(--green)}
.flash.warning{background:rgba(244,197,66,.12);border:1px solid rgba(244,197,66,.3);color:var(--gold)}
.field{margin-bottom:1.1rem}
label{display:block;font-size:11px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px}
input{width:100%;padding:11px 14px;background:#0F1520;border:1px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);transition:border-color .2s}
input:focus{outline:none;border-color:var(--gold)}
input::placeholder{color:#3A4560}
.btn{width:100%;padding:13px;background:var(--gold);color:#080C12;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:.5rem}
.btn:hover{opacity:.85}
.link{text-align:center;font-size:13px;color:var(--muted);margin-top:1.2rem}
.link a{color:var(--gold);text-decoration:none;font-weight:500}
</style>
</head>
<body>
<div class="box">
  <div class="logo">🌱 Mantra & Mind</div>
  <h1>Welcome back</h1>
  <p>Sign in to your wellness dashboard</p>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="field"><label>Email</label><input type="email" name="email" placeholder="you@email.com" required></div>
    <div class="field"><label>Password</label><input type="password" name="password" placeholder="Your password" required></div>
    <button type="submit" class="btn">Sign In →</button>
  </form>
  <div class="link">New here? <a href="/signup">Create account</a></div>
</div>
</body>
</html>
